name: 🕹 Daily Algorithm

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
jobs:
  generate-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate algorithm and update README
        run: python scripts/generate_algorithm.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "$(python -c "from datetime import datetime; from zoneinfo import ZoneInfo; print('알고리즘 ' + datetime.now(ZoneInfo('Asia/Seoul')).strftime('%Y.%m.%d'))")"
          git push
